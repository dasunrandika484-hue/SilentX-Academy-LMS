<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SilentX Academy — Learn Without Limits</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07070d; --surface: #0e0e18; --card: #13131e; --card-hover: #181826;
      --border: rgba(255,255,255,0.07); --border-bright: rgba(255,255,255,0.13);
      --text: #eeeef6; --muted: #5c5c74; --muted2: #8888a0; --accent: #7b68f0;
      --accent2: #9d8fff; --accent-glow: rgba(123,104,240,0.25);
      --gold: #e8b84b; --gold-dim: rgba(232,184,75,0.15); --gold-glow: rgba(232,184,75,0.3);
      --green: #3ecf8e; --red: #f55; --radius-sm: 10px; --radius-md: 16px;
      --radius-lg: 24px; --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif; --font-mono: 'DM Mono', monospace;
      --sidebar-w: 260px; --nav-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

    .page { display: none; position: relative; z-index: 1; }
    .page.active { display: block; animation: fadeUp 0.4s ease forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: var(--nav-h); background: rgba(7,7,13,0.8); backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4); border-bottom: 1px solid var(--border); display: flex; align-items: center; }
    .nav-inner { max-width: 1280px; margin: 0 auto; width: 100%; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; }
    .logo { cursor: pointer; display: flex; align-items: center; }
    .logo-text { font-family: var(--font-heading); font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
    .logo-text span { color: var(--accent2); }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 22px; border-radius: var(--radius-sm); border: none; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); text-decoration: none; font-weight: 600; font-size: 13px; font-family: var(--font-body); position: relative; overflow: hidden; white-space: nowrap; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, var(--accent) 0%, #5a48d4 100%); color: white; box-shadow: 0 4px 18px var(--accent-glow); }
    .btn-gold { background: linear-gradient(135deg, var(--gold) 0%, #d4a338 100%); color: #09090f; font-weight: 700; box-shadow: 0 4px 18px var(--gold-glow); }
    .btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border); }
    .btn-danger { background: rgba(255,77,77,0.12); color: var(--red); border: 1px solid rgba(255,77,77,0.2); }
    .btn-danger:hover { background: rgba(255,77,77,0.2); border-color: rgba(255,77,77,0.4); }
    .btn-sm { padding: 7px 14px; font-size: 12px; }
    .btn-full { width: 100%; }

    .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 120px 24px 80px; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(123,104,240,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(123,104,240,0.04) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(ellipse 80% 80% at 50% 40%, black 30%, transparent 80%); }
    .hero-orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .hero-orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(123,104,240,0.18) 0%, transparent 70%); top: -100px; left: 50%; transform: translateX(-50%); }
    .hero-inner { position: relative; z-index: 2; max-width: 700px; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 999px; background: rgba(123,104,240,0.1); border: 1px solid rgba(123,104,240,0.3); font-size: 12px; font-weight: 600; color: var(--accent2); margin-bottom: 28px; font-family: var(--font-mono); }
    .hero-title { font-family: var(--font-heading); font-size: clamp(48px, 8vw, 80px); font-weight: 800; line-height: 1.0; letter-spacing: -2px; margin-bottom: 20px; }
    .hero-title .grad { background: linear-gradient(135deg, #ffffff 30%, var(--accent2) 70%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-sub { font-size: 17px; color: var(--muted2); line-height: 1.6; margin-bottom: 40px; max-width: 500px; margin-left: auto; margin-right: auto; }
    .hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 24px 40px; position: relative; overflow: hidden; }
    .auth-card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; position: relative; z-index: 2; box-shadow: 0 24px 80px rgba(0,0,0,0.5); }
    .auth-card-title { font-family: var(--font-heading); font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }

    .field { margin-bottom: 16px; }
    .field-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .field-input, input, select { width: 100%; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 14px; transition: border-color 0.2s, box-shadow 0.2s; outline: none; margin-bottom: 14px; }
    input:focus, select:focus { border-color: rgba(123,104,240,0.5); box-shadow: 0 0 0 3px rgba(123,104,240,0.1); }

    .dash-shell { display: flex; min-height: 100vh; padding-top: var(--nav-h); }
    .sidebar { width: var(--sidebar-w); position: fixed; left: 0; top: var(--nav-h); bottom: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 28px 16px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
    .sidebar-avatar { width: 44px; height: 44px; border-radius: 12px; margin-bottom: 12px; background: linear-gradient(135deg, var(--accent), #5a48d4); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-weight: 800; font-size: 16px; color: white; }
    .sidebar-name { font-family: var(--font-heading); font-weight: 700; font-size: 16px; margin-bottom: 2px; }
    .sidebar-badge { padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; background: var(--gold-dim); color: var(--gold); }
    .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--muted2); cursor: pointer; transition: all 0.18s; border: none; background: none; width: 100%; text-align: left; }
    .sidebar-link.active { background: rgba(123,104,240,0.12); color: var(--accent2); }

    .dash-main { flex: 1; margin-left: var(--sidebar-w); padding: 40px; max-width: calc(1280px + var(--sidebar-w)); }
    .section-title { font-family: var(--font-heading); font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px 24px; }
    .stat-card-value { font-family: var(--font-heading); font-size: 32px; font-weight: 800; letter-spacing: -1px; }

    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
    .material-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 22px; transition: all 0.2s; position: relative; }
    .material-card:hover { border-color: var(--border-bright); transform: translateY(-3px); }
    .material-cat { display: inline-flex; padding: 3px 10px; border-radius: 999px; margin-bottom: 12px; font-size: 10px; font-weight: 700; background: var(--gold-dim); color: var(--gold); font-family: var(--font-mono); }
    .material-title { font-family: var(--font-heading); font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .material-desc { font-size: 13px; color: var(--muted2); margin-bottom: 18px; }

    .admin-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; max-width: 560px; margin-bottom: 40px; }
    .admin-form-title { font-family: var(--font-heading); font-size: 20px; font-weight: 700; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Management List Style */
    .manage-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .manage-item { background: var(--card); border: 1px solid var(--border); padding: 16px 20px; border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center; }
    .manage-item-info { display: flex; flex-direction: column; gap: 2px; }
    .manage-item-title { font-weight: 700; font-size: 14px; }
    .manage-item-sub { font-size: 12px; color: var(--muted2); }

    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: none; padding: 14px 20px; border-radius: var(--radius-sm); background: var(--card); border: 1px solid var(--border); box-shadow: 0 8px 40px rgba(0,0,0,0.5); font-size: 14px; animation: slideIn 0.3s; }
    #toast.show { display: flex; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 640px) { .sidebar { display: none; } .dash-main { margin-left: 0; padding: 24px 16px; } .stats-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav id="navbar">
  <div class="nav-inner">
    <div class="logo" onclick="navigate('home')">
      <span class="logo-text">Silent<span>X</span> Academy</span>
    </div>
    <div id="nav-auth-area">
      <button class="btn btn-primary" onclick="navigate('login')">Sign In →</button>
    </div>
  </div>
</nav>

<main>
  <div id="page-home" class="page active">
    <section class="hero">
      <div class="hero-orb hero-orb-1"></div>
      <div class="hero-inner">
        <div class="hero-badge">Batch 2025A — Now Live</div>
        <h1 class="hero-title">Learn <span class="grad">Smarter.</span><br>Go Further.</h1>
        <p class="hero-sub">Your study portal for Grades 6–11. Access notes, papers, and more.</p>
        <div class="hero-actions">
          <button class="btn btn-gold" onclick="navigate('login')">Get Started →</button>
        </div>
      </div>
    </section>
  </div>

  <div id="page-login" class="page">
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-card-title">Welcome back</div>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button class="btn btn-primary btn-full" id="btn-login-cloud">Connect to Cloud</button>
      </div>
    </div>
  </div>

  <div id="page-student" class="page">
    <div class="dash-shell">
      <aside class="sidebar">
        <div class="sidebar-avatar" id="s-avatar">S</div>
        <div class="sidebar-name" id="s-username">Student</div>
        <div class="sidebar-badge" id="s-grade-badge">G11</div>
        <button class="btn btn-danger btn-full" onclick="logout()" style="margin-top:auto;">Sign Out</button>
      </aside>
      <div class="dash-main">
        <h2 id="s-greeting" class="section-title">Welcome back!</h2>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-card-value" id="s-stat-grade">–</div><div>Grade</div></div>
          <div class="stat-card"><div class="stat-card-value" id="s-stat-count">–</div><div>Materials</div></div>
        </div>
        <div id="recent-materials" class="grid-2"></div>
      </div>
    </div>
  </div>

  <div id="page-admin" class="page">
    <div class="dash-shell">
      <aside class="sidebar">
        <div class="sidebar-name">Admin Panel</div>
        <button class="btn btn-danger btn-full" onclick="logout()" style="margin-top:auto;">Sign Out</button>
      </aside>
      <div class="dash-main">
        <h2 class="section-title">Control Center</h2>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; margin-top: 30px;">
          <div>
            <div class="admin-form">
              <div class="admin-form-title">📤 Upload Material</div>
              <input type="text" id="m-title" placeholder="Title">
              <input type="text" id="m-desc" placeholder="Description">
              <div class="form-row">
                <input type="text" id="m-category" placeholder="Category">
                <select id="m-grade">
                  <option value="6">Grade 6</option><option value="7">Grade 7</option>
                  <option value="8">Grade 8</option><option value="9">Grade 9</option>
                  <option value="10">Grade 10</option><option value="11" selected>Grade 11</option>
                </select>
              </div>
              <input type="text" id="m-url" placeholder="PDF URL">
              <button class="btn btn-primary btn-full" id="btn-upload">Upload to Cloud</button>
            </div>

            <div class="admin-form">
              <div class="admin-form-title">🎓 Register Student</div>
              <input type="text" id="s-fullname" placeholder="Full Name">
              <div class="form-row">
                <input type="text" id="s-new-username" placeholder="Username">
                <input type="password" id="s-new-password" placeholder="Password">
              </div>
              <select id="s-new-grade">
                <option value="6">Grade 6</option><option value="11" selected>Grade 11</option>
              </select>
              <button class="btn btn-gold btn-full" id="btn-add-student">Create Student Account</button>
            </div>
          </div>

          <div>
            <h3 class="section-title" style="font-size: 18px;">Manage Content</h3>
            <div id="admin-materials-list" class="manage-list"></div>
            
            <h3 class="section-title" style="font-size: 18px; margin-top: 40px;">Manage Students</h3>
            <div id="admin-users-list" class="manage-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCWmbnuhmFAEn5iOLror-KowL6zc2z77hM",
    authDomain: "eduportal-pro-e7549.firebaseapp.com",
    projectId: "eduportal-pro-e7549",
    storageBucket: "eduportal-pro-e7549.firebasestorage.app",
    messagingSenderId: "697737573320",
    appId: "1:697737573320:web:f223e766eeb9a57ad906fd"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let currentUser = null;

  async function handleCloudLogin() {
    const userInp = document.getElementById('login-username').value;
    const passInp = document.getElementById('login-password').value;
    showToast("Connecting...");

    try {
      const q = query(collection(db, "users"), where("username", "==", userInp), where("password", "==", passInp));
      const querySnapshot = await getDocs(q);

      if (!querySnapshot.empty) {
        querySnapshot.forEach((doc) => {
          currentUser = doc.data();
          showToast("✅ Login Success!");
          if (currentUser.role === 'ADMIN') {
            navigate('admin');
            renderAdminManagement();
          } else {
            navigate('student');
            renderStudentDashboard();
          }
        });
      } else { showToast("❌ Invalid Credentials"); }
    } catch (e) { showToast("❌ Error: " + e.message); }
  }

  async function renderStudentDashboard() {
    document.getElementById('s-username').innerText = currentUser.fullName;
    document.getElementById('s-grade-badge').innerText = "G" + currentUser.grade;
    document.getElementById('s-stat-grade').innerText = currentUser.grade;

    const container = document.getElementById('recent-materials');
    container.innerHTML = '<p>Loading...</p>';

    try {
      const q = query(collection(db, "materials"), where("targetGrade", "==", currentUser.grade));
      const querySnapshot = await getDocs(q);
      container.innerHTML = '';
      let count = 0;
      querySnapshot.forEach((doc) => {
        count++; const data = doc.data();
        container.innerHTML += `
          <div class="material-card">
            <span class="material-cat">${data.category}</span>
            <h4 class="material-title">${data.title}</h4>
            <p class="material-desc">${data.description}</p>
            <a href="${data.fileUrl}" target="_blank" class="btn btn-gold btn-sm">View PDF</a>
          </div>`;
      });
      document.getElementById('s-stat-count').innerText = count;
    } catch (e) { showToast("Error loading."); }
  }

  // --- ADMIN MANAGEMENT ---
  async function renderAdminManagement() {
    const materialList = document.getElementById('admin-materials-list');
    const userList = document.getElementById('admin-users-list');

    // Materials
    const mSnap = await getDocs(collection(db, "materials"));
    materialList.innerHTML = '';
    mSnap.forEach((d) => {
      const data = d.data();
      materialList.innerHTML += `
        <div class="manage-item">
          <div class="manage-item-info">
            <span class="manage-item-title">${data.title}</span>
            <span class="manage-item-sub">Grade ${data.targetGrade} • ${data.category}</span>
          </div>
          <button class="btn btn-danger btn-sm" onclick="deleteItem('materials', '${d.id}')">Delete</button>
        </div>`;
    });

    // Students
    const uSnap = await getDocs(query(collection(db, "users"), where("role", "==", "STUDENT")));
    userList.innerHTML = '';
    uSnap.forEach((d) => {
      const data = d.data();
      userList.innerHTML += `
        <div class="manage-item">
          <div class="manage-item-info">
            <span class="manage-item-title">${data.fullName}</span>
            <span class="manage-item-sub">@${data.username} • Grade ${data.grade}</span>
          </div>
          <button class="btn btn-danger btn-sm" onclick="deleteItem('users', '${d.id}')">Delete</button>
        </div>`;
    });
  }

  window.deleteItem = async (col, id) => {
    if(confirm("Are you sure?")) {
      try {
        await deleteDoc(doc(db, col, id));
        showToast("✅ Deleted!");
        renderAdminManagement();
      } catch (e) { showToast("Error deleting."); }
    }
  };

  async function handleUpload() {
    const title = document.getElementById('m-title').value;
    const desc = document.getElementById('m-desc').value;
    const grade = document.getElementById('m-grade').value;
    const cat = document.getElementById('m-category').value;
    const url = document.getElementById('m-url').value;

    if (!title || !url) return showToast("Fill all fields!");
    try {
      await addDoc(collection(db, "materials"), { title, description: desc, targetGrade: grade, category: cat, fileUrl: url, createdAt: new Date() });
      showToast("✅ Added!");
      renderAdminManagement();
    } catch (e) { showToast("Failed!"); }
  }

  async function handleAddStudent() {
    const fullName = document.getElementById('s-fullname').value;
    const user = document.getElementById('s-new-username').value;
    const pass = document.getElementById('s-new-password').value;
    const grade = document.getElementById('s-new-grade').value;

    if (!fullName || !user || !pass) return showToast("Fill details!");
    try {
      await addDoc(collection(db, "users"), { fullName, username: user, password: pass, grade, role: "STUDENT" });
      showToast("✅ Registered!");
      renderAdminManagement();
    } catch (e) { showToast("Failed!"); }
  }

  document.getElementById('btn-login-cloud').addEventListener('click', handleCloudLogin);
  document.getElementById('btn-upload').addEventListener('click', handleUpload);
  document.getElementById('btn-add-student').addEventListener('click', handleAddStudent);

  window.navigate = (page) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
  };
  window.logout = () => { currentUser = null; navigate('home'); };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
